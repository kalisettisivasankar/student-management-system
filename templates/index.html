<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        h1{
            color:darkblue;
        }

        form{
            background:white;
            padding:20px;
            width:350px;
            border-radius:8px;
            box-shadow:0px 0px 10px lightgray;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:10px;
        }

        input[type=submit]{
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        table{
            margin-top:20px;
            border-collapse:collapse;
            width:100%;
            background:white;
        }

        th{
            background:darkblue;
            color:white;
        }

        th,td{
            border:1px solid gray;
            padding:10px;
            text-align:center;
        }

        a{
            text-decoration:none;
            font-weight:bold;
            margin:5px;
        }
    </style>

</head>
<body>

<h1>Student Management System</h1>

<form method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Roll No</label>
<input type="text" name="rollno" required>

<label>Course</label>
<input type="text" name="course" required>

<input type="submit" value="Add Student">

</form>

<br>

<form method="GET">

<input type="text" name="search" placeholder="Search by Name or Roll No">

<input type="submit" value="Search">

</form>

<h2>Student List</h2>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Roll No</th>
<th>Course</th>
<th>Action</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>

<td>

<a href="/edit/{{ student[0] }}">Edit</a>

|

<a href="/delete/{{ student[0] }}">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>

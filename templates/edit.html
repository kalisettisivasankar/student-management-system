<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        form{
            background:white;
            width:350px;
            padding:20px;
            border-radius:8px;
            box-shadow:0px 0px 10px lightgray;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:10px;
        }

        input[type=submit]{
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>
<body>

<h1>Edit Student</h1>

<form method="POST">

<label>Name</label>
<input type="text" name="name" value="{{ student[1] }}" required>

<label>Roll No</label>
<input type="text" name="rollno" value="{{ student[2] }}" required>

<label>Course</label>
<input type="text" name="course" value="{{ student[3] }}" required>

<input type="submit" value="Update Student">

</form>

<br>

<a href="/">⬅ Back to Home</a>

</body>
</html>
